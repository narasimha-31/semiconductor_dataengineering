version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: semi_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - semi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semi_user -d semiconductor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: semi_kafka
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - semi_kafka_data:/var/lib/kafka/data
  
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: semi_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      PIPELINE_DB_HOST: postgres
      PIPELINE_DB_PORT: '5432'
      PIPELINE_DB_NAME: ${POSTGRES_DB}
      PIPELINE_DB_USER: ${POSTGRES_USER}
      PIPELINE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CENSUS_API_KEY: ${CENSUS_API_KEY}
      _PIP_ADDITIONAL_REQUIREMENTS: confluent-kafka==2.4.0 jsonschema==4.22.0
      PYTHONPATH: /opt/airflow
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Narasimha --lastname Admin --role Admin --email admin@example.com"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./producers:/opt/airflow/producers

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: semi_airflow_web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./producers:/opt/airflow/producers

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: semi_airflow_sched
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./producers:/opt/airflow/producers

volumes:
  semi_postgres_data:
  semi_kafka_data: